apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-brain
  namespace: train-ticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langgraph-brain
  template:
    metadata:
      labels:
        app: langgraph-brain
    spec:
      containers:
      - name: langgraph-api
        # Mock deployment referencing the NLP Brain fixing the codebase on deep path violations
        image: python:3.11-slim 
        command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
        env:
        - name: EVENT_BUS_URL
          value: "nats://nats-service:4222"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secret
              key: api-key
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: langgraph-service
  namespace: train-ticket
spec:
  selector:
    app: langgraph-brain
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
