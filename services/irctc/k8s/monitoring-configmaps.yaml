## ConfigMaps for Prometheus and Loki
## These must be applied BEFORE services-deployment.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: train-ticket
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: "gateway-service"
        static_configs:
          - targets: ["gateway-service:8000"]

      - job_name: "user-service"
        static_configs:
          - targets: ["user-service:8000"]

      - job_name: "auth-service"
        static_configs:
          - targets: ["auth-service:8000"]

      - job_name: "station-service"
        static_configs:
          - targets: ["station-service:8000"]

      - job_name: "train-service"
        static_configs:
          - targets: ["train-service:8000"]

      - job_name: "schedule-service"
        static_configs:
          - targets: ["schedule-service:8000"]

      - job_name: "ticket-service"
        static_configs:
          - targets: ["ticket-service:8000"]

      - job_name: "order-service"
        static_configs:
          - targets: ["order-service:8000"]

      - job_name: "payment-service"
        static_configs:
          - targets: ["payment-service:8000"]

      - job_name: "notification-service"
        static_configs:
          - targets: ["notification-service:8000"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: train-ticket
data:
  loki-config.yml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
      replication_factor: 1
      path_prefix: /loki

    schema_config:
      configs:
        - from: "2020-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      filesystem:
        directory: /loki/chunks

    limits_config:
      retention_period: 72h
      allow_structured_metadata: true
      volume_enabled: true
