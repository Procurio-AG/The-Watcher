## KEDA ScaledObjects — event-driven autoscaling for critical services
## Replaces the standard HPA with KEDA's richer trigger ecosystem.
##
## Prerequisites:
##   helm repo add kedacore https://kedacore.github.io/charts
##   helm install keda kedacore/keda --namespace keda --create-namespace
##
## These ScaledObjects use Prometheus triggers (request rate, error rate,
## queue depth) so scaling decisions are driven by real traffic signals
## rather than raw CPU — yielding tighter, cheaper scaling curves.
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: prometheus-trigger-auth
  namespace: train-ticket
spec:
  # No auth needed for in-cluster Prometheus
  secretTargetRef: []
---
## ── Payment Service ──────────────────────────────────────────────────────
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: payment-service-scaledobject
  namespace: train-ticket
  labels:
    app: payment-service
spec:
  scaleTargetRef:
    name: payment-service
  pollingInterval: 15          # Check triggers every 15s
  cooldownPeriod: 120          # Wait 2m before scaling back down
  minReplicaCount: 1
  maxReplicaCount: 5
  fallback:
    failureThreshold: 3        # After 3 failed polls, fall back to replicas below
    replicas: 2
  triggers:
    # ML anomaly score — multi-modal signal (logs + traces + metrics)
    # Drives proportional scaling: 0.25→1x, 0.50→2x, 0.75→3x, 1.0→4x replicas
    # Stale-metric guard: ignores scores older than 120s (edge-remedy down)
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-service:9090
        query: watcher_anomaly_score{exported_service="payment-service"} and (time() - watcher_last_push_timestamp{exported_service="payment-service"} < 120)
        threshold: "0.25"
        activationThreshold: "0.15"
      authenticationRef:
        name: prometheus-trigger-auth
    # Scale on request rate — safety net when ML misses traffic spikes
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-service:9090
        query: sum(rate(http_request_duration_seconds_count{job="payment-service"}[2m]))
        threshold: "50"
        activationThreshold: "5"
      authenticationRef:
        name: prometheus-trigger-auth
    # Scale on P95 latency — safety net if latency exceeds 1.5s
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-service:9090
        query: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="payment-service"}[2m])) by (le))
        threshold: "1.5"
        activationThreshold: "0.5"
      authenticationRef:
        name: prometheus-trigger-auth
    # Scale on error rate — safety net if 5xx rate exceeds 5/s
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-service:9090
        query: sum(rate(http_requests_total{job="payment-service", status=~"5.."}[2m]))
        threshold: "5"
        activationThreshold: "1"
      authenticationRef:
        name: prometheus-trigger-auth
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 2
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 180
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
---
## ── Ticket Service ───────────────────────────────────────────────────────
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ticket-service-scaledobject
  namespace: train-ticket
  labels:
    app: ticket-service
spec:
  scaleTargetRef:
    name: ticket-service
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 1
  maxReplicaCount: 5
  fallback:
    failureThreshold: 3
    replicas: 2
  triggers:
    # ML anomaly score — multi-modal signal (logs + traces + metrics)
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-service:9090
        query: watcher_anomaly_score{exported_service="ticket-service"} and (time() - watcher_last_push_timestamp{exported_service="ticket-service"} < 120)
        threshold: "0.25"
        activationThreshold: "0.15"
      authenticationRef:
        name: prometheus-trigger-auth
    # RPS safety net
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-service:9090
        query: sum(rate(http_request_duration_seconds_count{job="ticket-service"}[2m]))
        threshold: "80"
        activationThreshold: "10"
      authenticationRef:
        name: prometheus-trigger-auth
    # P95 latency safety net
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-service:9090
        query: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="ticket-service"}[2m])) by (le))
        threshold: "1.5"
        activationThreshold: "0.5"
      authenticationRef:
        name: prometheus-trigger-auth
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 2
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 180
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
---
