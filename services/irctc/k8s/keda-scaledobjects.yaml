## ── Gateway Service ──────────────────────────────────────────────────────
## The gateway is the entry point — scale it on total inbound RPS
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: gateway-service-scaledobject
  namespace: train-ticket
  labels:
    app: gateway-service
spec:
  scaleTargetRef:
    name: gateway-service
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 1
  maxReplicaCount: 4
  fallback:
    failureThreshold: 3
    replicas: 2
  triggers:
    # ML anomaly score — multi-modal signal (logs + traces + metrics)
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-service:9090
        query: watcher_anomaly_score{exported_service="gateway-service"} and (time() - watcher_last_push_timestamp{exported_service="gateway-service"} < 120)
        threshold: "0.25"
        activationThreshold: "0.15"
      authenticationRef:
        name: prometheus-trigger-auth
    # RPS safety net — gateway is the entry point
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-service:9090
        query: sum(rate(http_request_duration_seconds_count{job="gateway-service"}[2m]))
        threshold: "100"
        activationThreshold: "10"
      authenticationRef:
        name: prometheus-trigger-auth
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Pods
              value: 2
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Pods
              value: 1
              periodSeconds: 120
