  # ─── Visualizer ────────────────────────────────────────────────────────────

  - type: web
    name: visualizer-api
    runtime: docker
    dockerfilePath: ./deploy/render/Dockerfile.visualizer-api
    dockerContext: ./visualizer/api
    envVars:
      - key: PROMETHEUS_URL
        value: http://prometheus:9090
      - key: LOKI_URL
        value: http://loki:3100
      - key: JAEGER_URL
        value: http://jaeger:16686
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: visualizer-ui
    runtime: docker
    dockerfilePath: ./deploy/render/Dockerfile.visualizer-ui
    dockerContext: ./visualizer/ui
    buildFilter:
      paths:
        - visualizer/ui/**
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://visualizer-api.onrender.com
