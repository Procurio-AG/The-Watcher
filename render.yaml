  # ─── Gateway (Public) ──────────────────────────────────────────────────────

  - type: web
    name: gateway-service
    runtime: docker
    dockerfilePath: ./deploy/render/Dockerfile.gateway-service
    dockerContext: ./services/irctc/services
    envVars:
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
